name: Keep Render Awake 24/7
on:
  schedule:
    - cron: '*/5 * * * *' # প্রতি ৫ মিনিটে
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Server
        run: |
          curl -s https://somobay-ai.onrender.com > /dev/null
          echo "Pinged at $(date) - Server is awake!"